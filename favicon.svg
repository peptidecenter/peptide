<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00c6ff"/>
      <stop offset="100%" stop-color="#00ffaa"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="#0a0e17"/>
  <rect x="1.25" y="1.25" width="29.5" height="29.5" rx="5.75" fill="none" stroke="url(#g)" stroke-width="1" opacity="0.5"/>
  <!-- Peptide chain: 3 connected circles -->
  <circle cx="9" cy="16" r="3.5" fill="none" stroke="url(#g)" stroke-width="2"/>
  <circle cx="16" cy="10" r="3.5" fill="none" stroke="url(#g)" stroke-width="2"/>
  <circle cx="23" cy="16" r="3.5" fill="none" stroke="url(#g)" stroke-width="2"/>
  <!-- Bonds connecting them -->
  <line x1="11.5" y1="13.5" x2="13.5" y2="12" stroke="url(#g)" stroke-width="1.5"/>
  <line x1="18.5" y1="12" x2="20.5" y2="13.5" stroke="url(#g)" stroke-width="1.5"/>
  <!-- Small dot below center -->
  <circle cx="16" cy="22" r="2" fill="url(#g)" opacity="0.7"/>
</svg>
